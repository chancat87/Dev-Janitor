name: Feature request
description: Suggest an improvement to the application or developer workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Managing cache cleanup across multiple package managers is repetitive
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, references, or examples if useful.
