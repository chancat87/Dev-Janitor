name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please use this template for reproducible bugs.
        For security issues, do not file a public issue. Follow `SECURITY.md` instead.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the problem.
      placeholder: The app crashes when scanning a workspace with symlinks
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, commit, or release tag.
      placeholder: v2.3.5
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open Dev Janitor
        2. Start a workspace scan
        3. Select ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or add screenshots if they help explain the issue.
